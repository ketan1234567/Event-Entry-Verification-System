<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Event Entry - Processing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
  </head>
  <body class="bg-light d-flex align-items-center">
    <div class="container py-5">
      <div class="card shadow-sm flow-card text-center">
        <div class="card-body">
          <div class="spinner-border text-primary mb-3" role="status">
            <span class="visually-hidden">Processing...</span>
          </div>
          <h1 class="h5 mb-2">Processing your entry...</h1>
          <p class="text-muted small">Please wait while we verify your details.</p>
        </div>
      </div>
    </div>
    <script src="../assets/js/processing.js"></script>
  </body>
</html>
