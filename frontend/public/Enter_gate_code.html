<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Verification System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: #263238;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #b0bec5;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Input Group Styling */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #90a4ae;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #37474f;
            border: 2px solid #546e7a;
            border-radius: 4px;
            color: white;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4fc3f7;
            outline: none;
        }

        /* Button Styling */
        .btn-enter {
            width: 100%;
            padding: 15px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }

        .btn-enter:hover {
            background-color: #f44336;
        }

        .btn-enter:disabled {
            background-color: #757575;
            cursor: not-allowed;
        }

        /* Timer & Info */
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #ff8a80;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
        }

        .info-list {
            list-style: none;
            padding: 0;
            text-align: left;
            margin-top: 20px;
            border-top: 1px solid #37474f;
            padding-top: 20px;
        }

        .info-list li {
            color: #b0bec5;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .info-list li::before {
            content: "✓";
            color: #4fc3f7;
            font-weight: bold;
            margin-right: 10px;
        }

        /* Loading Spinner (Hidden by default) */
        .spinner {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome</h1>
        <p class="subtitle">
            Please proceed to any entry gate.<br>
            Please enter the code you received.
        </p>

        <!-- Added Employee ID for testing -->
        <div class="input-group">
            <label>Employee ID (For Testing)</label>
            <input type="text" id="employeeId" placeholder="e.g. 1" value="1">
        </div>

        <div class="input-group">
            <label>Gate Code</label>
            <input type="text" id="gateCode" placeholder="Enter Code" maxlength="5">
        </div>

        <button class="btn-enter" onclick="verifyCode()">
            <span id="spinner" class="spinner"></span>
            <span id="btnText">Enter Gate Code</span>
        </button>

        <div class="timer" id="timer">00:20</div>

        <ul class="info-list">
            <li>Code Changes Regularly</li>
            <li>Single Entry Only</li>
        </ul>
    </div>

    <script>
        // Simple Timer Countdown
        let timeLeft = 20;
        const timerElement = document.getElementById('timer');
        
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }, 1000);

        // API Call Function
        async function verifyCode() {
            const codeInput = document.getElementById('gateCode');
            const empInput = document.getElementById('employeeId');
            const btn = document.querySelector('.btn-enter');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            const code = codeInput.value.trim();
            const employeeId = empInput.value.trim();

            if (!code) {
                alert("Please enter a gate code.");
                return;
            }
            if (!employeeId) {
                alert("Please enter an Employee ID for testing.");
                return;
            }

            // UI Loading State
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = "Verifying...";

            try {
                // Replace with your actual API endpoint
                const response = await fetch('http://localhost:3000/api/public/verify-code', { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        code: code, 
                        employeeId: employeeId 
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert("Success: " + data.message);
                    codeInput.value = ""; // Clear input on success
                } else {
                    alert("Error: " + (data.message || data.error || "Unknown error"));
                }
            } catch (err) {
                console.error(err);
                alert("Network Error: Could not connect to server.");
            } finally {
                // Reset UI
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = "Enter Gate Code";
            }
        }
    </script>
</body>
</html>
