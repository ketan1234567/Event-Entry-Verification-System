<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Enter Gate Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link href="../assets/css/main.css" rel="stylesheet">
    <style>
      body {
        background: #000;
        color: #fff;
        min-height: 100vh;
        background-image: radial-gradient(circle, #ff0000 0, #000 60%);
        background-size: cover;
      }
      .gate-card {
        max-width: 420px;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .timer {
        font-size: 1.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body class="d-flex align-items-center">
    <div class="container py-4">
      <div class="gate-card p-4 text-center">
        <h2 class="mb-1">Welcome</h2>
        <div id="empName" class="fw-semibold mb-1"></div>
        <div id="empId" class="mb-3 small text-light"></div>

        <p class="mb-2">Please proceed to any entry gate</p>
        <p class="small text-light mb-3">Please enter the code you received.</p>

        <div class="mb-3">
          <input
            type="text"
            id="gateCode"
            class="form-control text-center"
            placeholder="Enter Code Shown at Entry Gate"
          >
        </div>
        <button id="btnSubmitCode" class="btn btn-danger w-100 mb-3">
          ENTER GATE CODE
        </button>

        <div class="timer mb-2" id="timer">00:20</div>
        <div id="message" class="small"></div>

        <div class="mt-3 small text-start text-light">
          <div>✓ Code Changes Regularly</div>
          <div>✓ Single Entry Only</div>
        </div>
      </div>
    </div>

    <script src="../assets/js/enter-gate-code.js"></script>
  </body>
</html>
