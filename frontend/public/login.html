<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OnDirect</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d6efd;       /* Professional Blue */
            --body-bg: #f8f9fa;             /* Light Gray Background */
            --card-bg: #ffffff;             /* White Cards */
            --text-main: #212529;           /* Dark Text */
            --text-muted: #6c757d;          /* Muted Text */
            --border-color: #e9ecef;        /* Light Border */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Decorative Background Elements (Optional) */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        /* Top Accent Line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), #a8c7fa);
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 1.5rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background-color: #fff;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 0.5rem;
            transition: transform 0.1s;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }

        /* Mobile Adjustments */
        @media (max-width: 576px) {
            body {
                padding: 1rem;
                align-items: flex-start;
                padding-top: 10vh;
            }
            .login-card {
                border-radius: 0.75rem;
                padding: 1.5rem;
                box-shadow: none; /* Flatter design on mobile for performance */
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-icon">
                <i class="bi bi-hexagon-fill"></i>
            </div>
            <h3 class="fw-bold mt-2">Welcome Back</h3>
            <p class="text-muted small mb-0">Please enter your credentials to login</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="admin@ondirect.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label d-flex justify-content-between">
                    <span>Password</span>
                    <a href="#" class="text-decoration-none small" style="color: var(--primary-color);">Forgot password?</a>
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 border-end-0" id="password" placeholder="Enter your password" required>
                    <button type="button" class="btn btn-outline-secondary border-start-0 bg-transparent" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Login to Dashboard
            </button>
        </form>

        <div class="divider text-center">OR</div>

        <p class="text-center text-muted small mb-0">
            Don't have an account? <a href="#" style="color: var(--primary-color); font-weight: 600;">Contact Admin</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
     <script>
        // API URL Configuration
        const API_URL = 'http://localhost:3000';

        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle Icon
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
        });

        // Form Submit Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');
            
            // UI Loading State
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            btn.disabled = true;

          try {
    // 1. Send POST request to Node.js API (Corrected URL)
    const response = await fetch('http://localhost:3000/api/public/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    // 2. Handle Response
    if (response.ok && data.success) {
        // Save Token to Local Storage
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userEmail', data.user.email);

        // Show success briefly then redirect
        btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Success!';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-success');

        setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
        }, 1000);
    } else {
        // Show Error
        alert(data.message || 'Login failed. Please try again.');
        btn.innerHTML = originalBtnText;
        btn.disabled = false;
    }

} catch (error) {
    console.error('Error:', error);
    alert('Cannot connect to server. Make sure Node.js is running on port 3000.');
    btn.innerHTML = originalBtnText;
    btn.disabled = false;
}
        });
    </script>
</body>
</html>
