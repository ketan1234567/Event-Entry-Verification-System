<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Entry Verification</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Face-API.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        /* --- Base Styles --- */
        body {
            background: radial-gradient(circle, #3b0000, #000);
            /* 100dvh handles mobile browser address bars correctly */
            min-height: 100dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            padding: 10px; /* Add slight padding for very small screens */
        }

        .mobile-card {
            max-width: 420px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            text-align: center;
            color: #ff3b3b;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- Live Time Style --- */
        .live-time-display {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            margin-bottom: 25px;
            font-family: 'Segoe UI', Roboto, monospace;
            letter-spacing: 0.5px;
        }

        /* --- Form Elements --- */
        input.form-control {
            background: #2b0000;
            border: 1px solid #ff3b3b;
            color: white;
            /* Font size 16px prevents auto-zoom on iPhone */
            font-size: 16px; 
            padding: 12px;
        }
        
        input.form-control::placeholder { color: #aaa; }
        input.form-control:focus {
            background: #2b0000;
            border-color: #ff6666;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(255, 59, 59, 0.25);
        }
        
        .form-control.is-invalid { border-color: #ff4444; }

        .btn-red {
            background: linear-gradient(180deg, #ff2a2a, #990000);
            border: none;
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            font-size: 16px;
            transition: opacity 0.3s, transform 0.1s;
        }

        .btn-red:active:not(:disabled) { transform: scale(0.98); }
        .btn-red:hover:not(:disabled) { background: #ff0000; color: white; }
        .btn-red:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Camera Section --- */
        .camera-container {
            margin-top: 20px;
            position: relative;
            display: none; 
            justify-content: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            /* Responsive Height */
            height: 350px; 
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Covers the area without stretching */
            transform: scaleX(-1);
            display: block;
        }

        #faceGuide {
            position: absolute;
            /* Responsive size */
            width: clamp(140px, 55vw, 240px);
            height: clamp(140px, 55vw, 240px);
            border: 4px solid rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #faceGuide.detected {
            border-color: #00ff00 !important;
            box-shadow: 0 0 25px #00ff00, 0 0 0 9999px rgba(0, 0, 0, 0.3);
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            min-height: 24px;
            color: #ffcccc;
            font-weight: 500;
        }

        #selfiePreview {
            display: none;
            width: 100%;
            max-width: 300px; /* Limit preview size */
            margin: 20px auto 0; /* Center preview */
            border-radius: 10px;
            border: 2px solid #00ff00;
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        /* --- Mobile Specific Adjustments --- */
        @media (max-width: 400px) {
            .mobile-card {
                padding: 20px 15px;
                border-radius: 15px;
            }
            
            .logo { font-size: 20px; margin-bottom: 0; }
            .live-time-display { font-size: 0.8rem; margin-bottom: 15px; }
            
            /* Reduce camera height on small phones to fit button/input */
            .camera-container { height: 280px; }
            
            .btn-red { padding: 12px; margin-top: 15px; }
            
            .message { font-size: 13px; }
        }
        
        /* Landscape Mode Handling */
        @media (max-height: 500px) and (orientation: landscape) {
            body { align-items: flex-start; padding-top: 20px; }
            .camera-container { height: 250px; }
        }
    </style>
</head>

<body>

<div class="mobile-card">
    <div class="logo">ONDIRECT</div>
    <!-- Live Time Added Here -->
    <div id="liveTime" class="live-time-display">Loading time...</div>

    <form id="signupForm">
        
        <label class="form-label">Employee ID</label>
        <input 
            id="employeeId"
            name="employeeId"
            class="form-control"
            placeholder="Enter Numeric ID"
            required
            inputmode="numeric"
            autocomplete="off"
        >
        <div id="employeeError" style="color:#ff4444;font-size:13px;margin-top:5px;"></div>

        <canvas id="canvas" style="display:none"></canvas>
        
        <div class="camera-container" id="cameraContainer">
            <video id="video" autoplay playsinline muted></video>
            <div id="faceGuide"></div>
        </div>

        <div id="cameraMessage" class="message"></div>

        <img id="selfiePreview" src="">

        <input type="hidden" id="selfieData" name="selfieData">

        <button type="submit" id="btnSubmit" class="btn-red" disabled>
            SUBMIT
        </button>
        
        <div id="formMessage" class="message"></div>
    </form>
</div>

<script>
    // --- 0. Live Time Function ---
    function updateLiveTime() {
        const now = new Date();
        const options = { 
            weekday: 'short', 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            hour12: true 
        };
        const timeString = now.toLocaleString('en-US', options);
        document.getElementById('liveTime').textContent = timeString;
    }
    // Initialize Time
    updateLiveTime();
    setInterval(updateLiveTime, 1000);


    // --- 1. DOM Elements ---
    const employeeError = document.getElementById("employeeError");
    const employeeInput = document.getElementById("employeeId");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const cameraContainer = document.getElementById("cameraContainer");
    const faceGuide = document.getElementById("faceGuide");
    const preview = document.getElementById("selfiePreview");
    const selfieDataInput = document.getElementById("selfieData");
    const cameraMessage = document.getElementById("cameraMessage");
    const signupForm = document.getElementById("signupForm");
    const btnSubmit = document.getElementById("btnSubmit");
    const formMessage = document.getElementById("formMessage");

    let stream;
    let modelLoaded = false;
    let captureDone = false;
    let detectionLoop = null;
    let eyesOpenFrames = 0;
    let checkIdTimer = null; 

    // --- 2. Input Listener ---
    employeeInput.addEventListener("input", function (e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        employeeError.textContent = "";
        employeeInput.classList.remove("is-invalid");
        clearTimeout(checkIdTimer);
        if (!this.value) return;
        
        checkIdTimer = setTimeout(async () => {
            try {
                const checkRes = await fetch(`http://localhost:3000/api/public/check-employee/${this.value}`);
                const checkData = await checkRes.json();
                if (checkData.exists) {
                    employeeError.textContent = "Employee ID already exists.";
                    employeeInput.classList.add("is-invalid");
                    btnSubmit.disabled = true; 
                } else {
                    if (selfieDataInput.value) btnSubmit.disabled = false;
                }
            } catch (err) { console.error("Error checking ID:", err); }
        }, 500);
    });

    // --- 3. Load AI Models ---
    async function loadModel() {
        if (modelLoaded) return;
        try {
            cameraMessage.textContent = "Loading AI Models...";
            await faceapi.nets.tinyFaceDetector.loadFromUri("./models");
            await faceapi.nets.faceLandmark68Net.loadFromUri("./models");
            modelLoaded = true;
            cameraMessage.textContent = "Models loaded.";
        } catch (err) {
            console.error("Model load error:", err);
            cameraMessage.textContent = "Error: Missing model files in './models' folder.";
        }
    }

    employeeInput.addEventListener("blur", async () => {
        if (captureDone) return;
        if (!employeeInput.value) return;
        if (!employeeInput.checkValidity()) {
            cameraMessage.textContent = "Employee ID must be numeric";
            return;
        }
        await loadModel();
        startCamera();
    });

    // --- 5. Start Camera ---
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });
            video.srcObject = stream;
            cameraContainer.style.display = "block";
            
            video.addEventListener('loadeddata', () => {
                cameraMessage.textContent = "Scanning...";
                detectFace();
            });
        } catch (err) {
            console.error("Camera error:", err);
            cameraMessage.textContent = "Camera access denied or not available.";
        }
    }

    // --- 6. Eye Detection Helper ---
    function checkEyesOpen(landmarks) {
        if (!landmarks) return { isBothOpen: false };
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        
        const getEAR = (eye) => {
            if (!eye || eye.length < 6) return 1;
            const v1 = Math.sqrt(Math.pow(eye[1].x - eye[5].x, 2) + Math.pow(eye[1].y - eye[5].y, 2));
            const v2 = Math.sqrt(Math.pow(eye[2].x - eye[4].x, 2) + Math.pow(eye[2].y - eye[4].y, 2));
            const h = Math.sqrt(Math.pow(eye[0].x - eye[3].x, 2) + Math.pow(eye[0].y - eye[3].y, 2));
            if (h === 0) return 1;
            return (v1 + v2) / (2.0 * h);
        };
        
        const leftEAR = getEAR(leftEye);
        const rightEAR = getEAR(rightEye);
        const threshold = 0.25; 
        return { isBothOpen: (leftEAR > threshold) && (rightEAR > threshold) };
    }

    // --- 7. Face Detection Loop ---
    async function detectFace() {
        if (captureDone) return;
        
        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
        const result = await faceapi.detectSingleFace(video, options).withFaceLandmarks();
        
        faceGuide.classList.remove("detected"); 

        if (!result || !result.landmarks) {
            cameraMessage.textContent = "No face detected.";
            eyesOpenFrames = 0;
            detectionLoop = requestAnimationFrame(detectFace);
            return;
        }

        const box = result.detection.box;
        const landmarks = result.landmarks;
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        
        const faceWidth = box.width;
        const faceCenterX = box.x + faceWidth / 2;
        const faceCenterY = box.y + box.height / 2;
        const screenCenterX = videoWidth / 2;
        const screenCenterY = videoHeight / 2;

        if (faceWidth > videoWidth * 0.6) {
            cameraMessage.textContent = "Too close! Move back."; 
            eyesOpenFrames = 0; 
            detectionLoop = requestAnimationFrame(detectFace); 
            return;
        }
        if (faceWidth < videoWidth * 0.15) {
            cameraMessage.textContent = "Too far! Move closer."; 
            eyesOpenFrames = 0; 
            detectionLoop = requestAnimationFrame(detectFace); 
            return;
        }
        
        const offsetX = Math.abs(screenCenterX - faceCenterX);
        const offsetY = Math.abs(screenCenterY - faceCenterY);
        
        if (offsetX > videoWidth * 0.12 || offsetY > videoHeight * 0.12) {
            cameraMessage.textContent = "Align properly in the circle."; 
            eyesOpenFrames = 0; 
            detectionLoop = requestAnimationFrame(detectFace); 
            return;
        }
        
        const eyeStatus = checkEyesOpen(landmarks);
        if (!eyeStatus.isBothOpen) {
            eyesOpenFrames = 0; 
            cameraMessage.textContent = "Please open both eyes."; 
            detectionLoop = requestAnimationFrame(detectFace); 
            return;
        }
        
        eyesOpenFrames++;
        if (eyesOpenFrames < 5) {
            cameraMessage.textContent = "Hold still..."; 
            detectionLoop = requestAnimationFrame(detectFace); 
            return;
        }
        
        faceGuide.classList.add("detected");
        cameraMessage.textContent = "Perfect! Capturing...";
        cameraMessage.style.color = "#00ff00";
        
        setTimeout(() => { if(!captureDone) captureSelfie(); }, 300);
    }

    // --- 8. Capture Logic ---
    function captureSelfie() {
        captureDone = true;
        cancelAnimationFrame(detectionLoop); 
        
        const ctx = canvas.getContext("2d");
        canvas.width = 640; canvas.height = 480;
        ctx.translate(canvas.width, 0); 
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 640, 480);
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        
        const image = canvas.toDataURL("image/jpeg", 0.8);
        
        if(stream) stream.getTracks().forEach(track => track.stop());
        
        cameraContainer.style.display = "none";
        preview.src = image; 
        preview.style.display = "block";
        selfieDataInput.value = image;
        
        btnSubmit.disabled = false;
        cameraMessage.textContent = "Photo captured! Click Submit.";
    }

    // --- 9. Form Submit Handler ---
    signupForm.addEventListener("submit", async (e) => {
        e.preventDefault(); 
        e.stopPropagation();

        if (!selfieDataInput.value) {
            formMessage.textContent = "Please capture selfie first.";
            formMessage.style.color = "#ff4444";
            return;
        }

        const originalText = btnSubmit.textContent;
        btnSubmit.textContent = "Submitting...";
        btnSubmit.disabled = true;
        
        formMessage.textContent = "Submitting data...";
        formMessage.style.color = "#ffffff";

        const payload = {
            employeeId: employeeInput.value,
            selfieData: selfieDataInput.value
        };

        try {
            const res = await fetch("http://localhost:3000/api/public/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (!res.ok || data.error) {
                btnSubmit.textContent = originalText;
                btnSubmit.disabled = false;

                if (data.error === "Employee_ID_already_exists") {
                    employeeError.textContent = "Employee ID already exists.";
                    employeeInput.classList.add("is-invalid");
                    employeeInput.focus();
                    formMessage.textContent = ""; 
                } else {
                    formMessage.textContent = data.message || "Submission failed.";
                    formMessage.style.color = "#ff4444";
                }
                return;
            }

            // SUCCESS
            localStorage.setItem("employeeId", payload.employeeId);

            btnSubmit.textContent = "Submitted";
            formMessage.textContent = "✔ Entry recorded successfully";
            formMessage.style.color = "#00ff00";

            setTimeout(() => {
                window.location.href = "./Enter_gate_code.html"; 
            }, 1500);

        } catch (err) {
            console.error("Network Error:", err);
            btnSubmit.textContent = originalText;
            btnSubmit.disabled = false;
            formMessage.textContent = "Network error. Check server connection.";
            formMessage.style.color = "#ff4444";
        }
    });
</script>
</body>
</html>
