<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Event Entry - Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
  </head>
  <body class="bg-light d-flex align-items-center">
    <div class="container py-5">
      <div class="card shadow-sm flow-card">
        <div class="card-body">
          <h1 class="h4 mb-3 text-center">Your Details</h1>
          <p class="text-muted small text-center mb-4">Please confirm or fill in your information.</p>
          <form id="detailsForm">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" id="department">
            </div>
            <button type="submit" class="btn btn-primary w-100">Continue</button>
          </form>
        </div>
      </div>
    </div>
    <script src="../assets/js/details-form.js"></script>
  </body>
</html>
