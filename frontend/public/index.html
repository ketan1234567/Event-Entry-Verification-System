<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Event Entry - QR Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
  </head>
  <body class="bg-light d-flex align-items-center">
    <div class="container py-5">
      <div class="card shadow-sm qr-card">
        <div class="card-body text-center">
          <h1 class="h4 mb-3">Scan QR Code to Start</h1>
          <p class="text-muted mb-4">
            Point your camera at the event QR code. If you opened this page from the QR, tap the button below to continue.
          </p>
          <div class="qr-placeholder mb-4">
            <span class="qr-square"></span>
          </div>
          <button id="btnStart" type="button" class="btn btn-primary w-100">
            Continue to Sign In
          </button>
        </div>
      </div>
    </div>
    <script src="../assets/js/qr-entry.js"></script>
  </body>
</html>
