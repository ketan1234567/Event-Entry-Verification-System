<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | OnDirect</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- DataTables Buttons CSS -->
    <link href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --sidebar-bg: #ffffff;
            --body-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --sidebar-active: #e7f1ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            z-index: 1050;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .logo-text {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .nav-link {
            color: var(--text-muted);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 0.375rem;
            margin: 0.25rem 1rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-active);
            color: var(--primary-color);
        }
        
        .divider { border-top: 1px solid var(--border-color); margin: 1rem 0; }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s ease;
        }

        .page-header { margin-bottom: 2rem; }
        .page-title { font-weight: 600; color: var(--text-main); }

        /* Live Time Style */
        .live-datetime {
            font-size: 0.875rem;
            color: var(--primary-color);
            font-weight: 500;
            background: rgba(13, 110, 253, 0.08);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            display: inline-block;
            margin-top: 0.25rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Cards */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-2px); }

        .stat-card .icon-circle {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
        }

        .stat-card .text-muted { font-size: 0.875rem; font-weight: 500; }
        .stat-card h2 { font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0; }

        /* Data Card & Table */
        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
        }
        
        .card-header-custom {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
        }

        /* DataTables Custom Styling */
        .dataTables_wrapper .btn-group-vertical > .btn, 
        .dataTables_wrapper .btn-group > .btn {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: none !important;
        }
        
        .dataTables_wrapper .dt-buttons .btn {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            color: white !important;
            margin-right: 5px;
            border-radius: 0.375rem !important;
        }

        .dataTables_wrapper .dataTables_length select,
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.25rem 0.5rem;
        }

        .dataTables_wrapper .dataTables_info { color: var(--text-muted); }
        
        .table th { 
            color: var(--text-muted); 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            background-color: var(--body-bg);
        }
        
        .table td { color: var(--text-main); }

        /* Mobile Responsive */
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
            .main-content { margin-left: 0; padding: 1rem; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        
        .logout-link { color: #dc3545 !important; }
        .logout-link:hover { background-color: rgba(220, 53, 69, 0.05) !important; color: #a71d2a !important; }
    </style>
</head>
<body style="display: none;">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-hexagon-fill fs-3 text-primary"></i>
            <span class="logo-text">OnDirect</span>
        </div>
        
        <div class="divider"></div>
        
        <ul class="nav flex-column mt-2">
            <li class="nav-item">
                <a class="nav-link active" data-page="dashboard">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-page="hr">
                    <i class="bi bi-person-plus-fill"></i> HR & Gate Management
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-page="employee">
                    <i class="bi bi-people-fill"></i> Employee Records
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-page="logs">
                    <i class="bi bi-qr-code-scan"></i> Verification Logs
                </a>
            </li>

             <li class="nav-item">
                <a class="nav-link" id="verify-qr" style="display: none;" >
                    <a class="nav-link" href="verify-qr.html">
                    <i class="bi bi-camera"></i>
                    <span>Scanner Verification</span>
                    </a>
                </a>
            </li>
            
            <!-- NEW MENU ITEM HERE -->
            <li class="nav-item" id="navGenerateCode" style="display: none;">
                <a class="nav-link" href="generate-code.html">
                    <i class="bi bi-qr-code"></i>
                    <span>Generate-code-Entry-pass</span>
                </a>
            </li>
        </ul>

        <div class="mt-auto">
            <div class="divider"></div>
            <div class="p-3">
                <div class="d-flex align-items-center mb-3">
                    <div class="avatar-sm bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                        A
                    </div>
                    <div class="ms-3">
                        <h6 class="mb-0 small user-name">Admin User</h6>
                        <small class="text-muted user-email">admin@ondirect.com</small>
                    </div>
                </div>
                <a href="#" class="nav-link logout-link" id="logoutBtn">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar for Mobile -->
        <div class="d-lg-none mb-4 d-flex justify-content-between align-items-center">
            <button class="btn btn-light border" id="toggleBtn"><i class="bi bi-list"></i></button>
            <span class="fw-bold text-primary">OnDirect</span>
            <div></div>
        </div>

        <!-- Page Header -->
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h3 class="page-title mb-1" id="pageTitle">Dashboard Overview</h3>
                <div id="liveTime" class="live-datetime">Loading time...</div>
            </div>
            <div class="d-flex gap-2">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display: none;">
                <button class="btn btn-success" id="importBtn">
                    <i class="bi bi-upload me-2"></i>Import Data
                </button>
                <button class="btn btn-primary" id="addNewBtn" data-bs-toggle="modal" data-bs-target="#createHRModal">
                    <i class="bi bi-plus-lg me-2"></i>Add New
                </button>
            </div>
        </div>

        <!-- Stats Cards Container -->
        <div class="row g-4 mb-4" id="statsContainer">
            <!-- Stats injected by JS -->
        </div>

        <!-- Data Table Card -->
        <div class="data-card">
            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <h5 class="mb-0" id="tableTitle">Data Table</h5>
            </div>
            
            <div class="p-3">
                <table id="mainTable" class="table table-hover align-middle mb-0" style="width:100%">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create HR Modal -->
    <div class="modal fade" id="createHRModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Add New HR</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <form id="createHRForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Full Name</label>
                            <input type="text" class="form-control" placeholder="e.g., John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Email Address</label>
                            <input type="email" class="form-control" placeholder="e.g., john@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control" placeholder="Create a strong password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Assign Gate</label>
                            <select class="form-select">
                                <option value="Gate 1">Gate 1</option>
                                <option value="Gate 2">Gate 2</option>
                                <option value="Gate 3">Gate 3</option>
                                <option value="Gate 4">Gate 4</option>
                            </select>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Create User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

   <script>
    let dataTable;
    let currentPage = 'dashboard';
    let CURRENT_USER = { role: null, name: '', email: '' };

    $(document).ready(function() {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'login.html'; return; }
        verifyTokenAndGetUser(token);
    });

    async function verifyTokenAndGetUser(token) {
        try {
            const response = await fetch('http://localhost:3232/api/public/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error("Unauthorized");
            const data = await response.json();
            CURRENT_USER = { role: data.user.role, name: data.user.username, email: data.user.email };
            initializeDashboard();
        } catch (error) {
            localStorage.removeItem('authToken');
            window.location.href = 'login.html';
        }
    }

    function initializeDashboard() {
        document.body.style.display = "block";
        applyRoleAccess();
        loadPage('dashboard');
        setupEventListeners();
    }

    // ==========================================
    // 5. ROLE-BASED ACCESS CONTROL (RBAC)
    // ==========================================
    function applyRoleAccess() {
        const role = CURRENT_USER.role;

        // Update Sidebar Profile
        const initials = CURRENT_USER.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        $('.avatar-sm').text(initials);
        $('.user-name').text(CURRENT_USER.name);
        $('.user-email').text(CURRENT_USER.email);

        // Reset Visibility (Hide all first)
        $('a[data-page="hr"]').parent().hide();
        $('a[data-page="employee"]').parent().hide();
        $('#importBtn').hide();
        $('#addNewBtn').hide();
        $('#navGenerateCode').hide();
        $('#verify-qr').hide();

        // Logic for Admin
        if (role === 'admin') {
            $('a[data-page="hr"]').parent().show();
            $('a[data-page="employee"]').parent().show();
            $('#importBtn').show();
            $('#addNewBtn').show();
        }
        // Logic for Gate Users
        else if (['Gate1', 'Gate2', 'Gate3', 'Gate4', 'get1', 'get2', 'get3', 'get4'].includes(role)) {
            $('#navGenerateCode').show();
            $('#verify-qr').show();
        }
    }

    function setupEventListeners() {
        $('.nav-link[data-page]').on('click', function() {
            const page = $(this).data('page');
            loadPage(page);
            $('.nav-link').removeClass('active');
            $(this).addClass('active');
            if (window.innerWidth < 992) $('#sidebar').removeClass('active');
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('authToken');
                window.location.href = 'login.html';
            }
        });

        document.getElementById('toggleBtn').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('active'); });
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', handleFileImport);
    }

    const pageConfig = {
    'dashboard': { title: 'Dashboard Overview', tableTitle: 'Recent Activity', stats: [{ label: 'Total Verified', value: '1,240', icon: 'bi-check-circle-fill', color: 'success' }, { label: 'Active Gates', value: '4', icon: 'bi-door-open-fill', color: 'primary' }], columns: ['Time', 'User', 'Action', 'Gate', 'Status', 'Action'] },
    'hr': { title: 'HR & Gate Management', tableTitle: 'HR List', stats: [{ label: 'Total HR', value: '8', icon: 'bi-people-fill', color: 'primary' }], columns: ['Name', 'Email', 'Role', 'Gate', 'Status', 'Action'] },
    'employee': { title: 'Employee Records', tableTitle: 'All Employees', stats: [], columns: ['ID', 'Name', 'Dept', 'Phone', 'Status', 'Action'] },
    
    // ✅ UPDATED: Added 'Emp ID' and 'Gate Code' columns
    'logs': { 
        title: 'Verification Logs', 
        tableTitle: 'Entry Logs', 
        stats: [{ label: 'Today Entries', value: '450', icon: 'bi-box-arrow-in-right', color: 'success' }], 
        columns: ['Log ID', 'Emp ID', 'Name', 'Gate Code', 'Time', 'Status', 'Action'] 
    }
};

    function loadPage(pageName) {
        if (CURRENT_USER.role !== 'admin' && (pageName === 'hr' || pageName === 'employee')) pageName = 'dashboard';

        currentPage = pageName;
        const config = pageConfig[pageName];
        $('#pageTitle').text(config.title);
        $('#tableTitle').text(config.tableTitle);

        let statsHtml = '';
        config.stats.forEach(stat => {
            statsHtml += `<div class="col-sm-6 col-xl-3"><div class="stat-card"><div class="d-flex justify-content-between"><div><p class="text-muted mb-1">${stat.label}</p><h2>${stat.value}</h2></div><div class="icon-circle bg-${stat.color} bg-opacity-10 text-${stat.color}"><i class="bi ${stat.icon}"></i></div></div></div></div>`;
        });
        $('#statsContainer').html(statsHtml);

        if (dataTable) dataTable.destroy();
        let headerHtml = '<tr>';
        config.columns.forEach(col => headerHtml += `<th>${col}</th>`);
        headerHtml += '</tr>';
        $('#tableHead').html(headerHtml);
        $('#tableBody').html('');

        // Initialize empty DataTable
        dataTable = $('#mainTable').DataTable({ responsive: true });

        // ==================================================
        // LOGIC: FETCH DATA BASED ON PAGE
        // ==================================================
        if (pageName === 'logs') {
            fetchVerificationLogs(); // CALL THE NEW API FUNCTION
        } else {
            addDummyRow(pageName);
        }
    }

    // ==========================================
    // NEW FUNCTION: FETCH VERIFICATION LOGS
    // ==========================================
    async function fetchVerificationLogs() {
    try {
        const token = localStorage.getItem('authToken');
        const response = await fetch('http://localhost:3232/api/public/verification-logs', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await response.json();

        if (result.success) {
            dataTable.clear().draw(); 

            result.data.forEach(log => {
                // Format Time
                const entryTime = new Date(log.entry_time);
                const timeString = entryTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

                // Format Status
                const statusBadge = `<span class="badge bg-${log.status === 'entered' ? 'success' : 'warning'}">${log.status}</span>`;
                
                // Format Log ID
                const logId = `#LOG${String(log.id).padStart(3, '0')}`;

                // ✅ PREPARE DATA FOR ALL COLUMNS
                // Columns: ['Log ID', 'Emp ID', 'Name', 'Gate Code', 'Time', 'Status', 'Action']
                const rowData = [
                    logId,                              // 1. Log ID
                    log.emp_id || 'N/A',                // 2. Emp ID (from DB)
                    log.employee_name || 'Visitor',     // 3. Name
                    log.gate_code || 'N/A',             // 4. Gate Code (from DB)
                    timeString,                         // 5. Time
                    statusBadge,                        // 6. Status
                    '<button class="btn btn-sm btn-light border"><i class="bi bi-eye"></i></button>' // 7. Action
                ];

                dataTable.row.add(rowData).draw();
            });
        } else {
            console.error("Failed to load logs");
        }
    } catch (error) {
        console.error("Error fetching logs:", error);
    }
}

    function addDummyRow(page) {
        // This is for other pages, kept as is
        if (page === 'dashboard') dataTable.row.add(['10:00 AM', 'Admin', 'Login', 'Gate 1', 'Success', '<button class="btn btn-sm btn-light border"><i class="bi bi-eye"></i></button>']).draw();
    }

    function updateLiveTime() {
        const now = new Date();
        document.getElementById('liveTime').textContent = now.toLocaleString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    updateLiveTime();
    setInterval(updateLiveTime, 1000);

    function handleFileImport(e) {
        // Import logic here...
    }

    document.getElementById('createHRForm').addEventListener('submit', function(e) {
        e.preventDefault();
        bootstrap.Modal.getInstance(document.getElementById('createHRModal')).hide();
        alert('HR User Created Successfully!');
    });
</script>
</body>
</html>
