<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Verified Success</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tech-red-glow: #ff1744;
            --deep-blood-red: #500000;
            --dark-bg: #1a0000;
        }

        body {
            font-family: 'Roboto', sans-serif;
            /* Deep Tech Red Background Style */
            background-color: #1a0505;
            background-image: 
                radial-gradient(circle at 50% 0%, #b71c1c 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, #500000 0%, transparent 50%),
                linear-gradient(180deg, rgba(26,5,5,1) 0%, rgba(50,0,0,1) 100%);
            
            /* Fallback for older browsers */
            background-blend-mode: screen;
            
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Optional: Tech Grid Overlay for extra effect */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .verification-card {
            position: relative;
            z-index: 1; /* Above the grid overlay */
            width: 100%;
            max-width: 420px;
            /* Glassmorphism effect for the card */
            background: rgba(30, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Header Styling */
        .brand-badge {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(183, 28, 28, 0.4);
        }

        .verified-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .checkmark-circle {
            width: 32px;
            height: 32px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
        }

        .verified-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2ecc71;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Profile Styling */
        .avatar-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 2;
        }

        .user-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .user-id {
            font-size: 1rem;
            opacity: 0.7;
            font-family: 'Roboto', monospace;
            letter-spacing: 1px;
        }

        /* Footer Styling */
        .success-label {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .live-time {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            opacity: 0.8;
            font-family: 'Roboto', monospace;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .footer-message {
            font-size: 0.95rem;
            opacity: 0.7;
            line-height: 1.6;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; border-color: rgba(255, 255, 255, 0.3); }
            100% { transform: scale(1); opacity: 0.5; }
        }

        /* Mobile Responsive */
        @media (max-width: 400px) {
            .verification-card {
                padding: 1.5rem;
                margin: 10px;
                border-radius: 15px;
            }
            .user-name { font-size: 1.5rem; }
            .success-label { font-size: 2rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="verification-card">
        <!-- Header -->
        <div class="brand-badge">ON DIRECT</div>
        
        <div class="verified-header">
            <div class="checkmark-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" class="bi bi-check-lg" viewBox="0 0 16 16">
                    <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.733.733 0 0 1 0-1.06l.195-.195a.733.733 0 0 1 1.057 0l2.56 2.56 5.707-5.719z"/>
                </svg>
            </div>
            <span class="verified-text">ENTRY VERIFIED!</span>
        </div>

        <!-- Profile Section -->
        <div class="mb-4">
            <div class="avatar-wrapper">
                <div class="avatar-ring"></div>
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&crop=face" alt="User Photo" class="avatar-img">
            </div>
            <h2 class="user-name">Akshay S</h2>
            <p class="user-id">#78231</p>
        </div>

        <!-- Footer -->
        <div class="mt-4">
            <h1 class="success-label">SUCCESS</h1>
            <div class="live-time" id="liveTime">Loading time...</div>
            <p class="footer-message">Your entry has been verified.<br>Enjoy the event!</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            document.getElementById('liveTime').textContent = now.toLocaleString('en-US', options);
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
