<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Event Entry - Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
  </head>
  <body class="bg-light d-flex align-items-center">
    <div class="container py-5">
      <div class="card shadow-sm flow-card text-center">
        <div class="card-body">
          <div class="mb-3 text-success display-6">✓</div>
          <h1 class="h5 mb-2">Entry Successful</h1>
          <p id="successMessage" class="text-muted small mb-3">
            You have been successfully checked in.
          </p>
          <button id="btnDone" type="button" class="btn btn-outline-primary w-100">
            Close
          </button>
        </div>
      </div>
    </div>
    <script src="../assets/js/success.js"></script>
  </body>
</html>
